apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: toggle-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: togglemaster-sa
      imagePullSecrets:
        - name: ecr-registry-secret
      containers:
      - name: auth-service
        image: 211797838481.dkr.ecr.us-east-1.amazonaws.com/auth-service:latest
        resources:
          requests:
            cpu: "250m"    
            memory: "128Mi"
          limits:
            cpu: "500m"   
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 60
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 2   
        ports:
        - name: http 
          containerPort: 8001
        env:
        - name: PORT
          value: "8001"
        # MASTER_KEY agora vem da Secret
        - name: MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: master-key
        
        # --- Montagem do Banco ---
        - name: DB_USER
          valueFrom: { configMapKeyRef: { name: app-config, key: db-user } }
        - name: DB_PASSWORD
          valueFrom: { secretKeyRef: { name: app-secrets, key: db-password } }
        - name: DB_HOST
          valueFrom: { configMapKeyRef: { name: app-config, key: auth-db-host } }
        - name: DB_PORT
          valueFrom: { configMapKeyRef: { name: app-config, key: db-port } }
        - name: DB_NAME
          valueFrom: { configMapKeyRef: { name: app-config, key: auth-db-name } }
        - name: DATABASE_URL
          value: "postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
        # --- OpenTelemetry ---
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom: { configMapKeyRef: { name: app-config, key: otel-collector-http } }
        - name: OTEL_EXPORTER_OTLP_INSECURE
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "auth-service"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.namespace=toggle-master"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: toggle-master
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - port: 80          # Porta do Cluster
      targetPort: 8001  # Porta do Container